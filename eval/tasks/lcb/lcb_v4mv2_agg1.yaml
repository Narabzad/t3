tag:
  - code_generation
task: lcb_v4mv2_agg1
# Placeholder dataset — actual data loaded from local JSONL in process_docs
dataset_path: json
dataset_kwargs:
  data_files:
    test: lcb_v4_minus_v2_data.jsonl
test_split: test
process_docs: !function utils.process_docs
output_type: generate_until
doc_to_text: !function utils.doc_to_text
doc_to_target: question_id  # Not used for scoring; pass@1 is computed from code execution
process_results: !function utils.process_results
generation_kwargs:
  until: []
  do_sample: false
  temperature: 1
  max_gen_toks: 16384
repeats: 1
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
  - metric: pass_at_1
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
